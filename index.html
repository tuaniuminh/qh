<!DOCTYPE html>
<html lang="vi" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#6c63ff" />
  <meta name="description" content="MenControl Pro - Ứng dụng giáo dục sức khỏe nam giới chuyên sâu. Rèn luyện kỹ năng kiểm soát, cơ PC, Kegel và Reverse Kegel." />
  <meta name="keywords" content="sức khỏe nam giới, kegel, cơ PC, kiểm soát xuất tinh, rèn luyện" />
  <meta name="author" content="MenControl Pro" />
  <meta name="robots" content="noindex, nofollow" />

  <!-- PWA -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MenControl" />

  <!-- Open Graph -->
  <meta property="og:title" content="MenControl Pro" />
  <meta property="og:description" content="Ứng dụng giáo dục sức khỏe — Đăng nhập để tiếp tục" />
  <meta property="og:type" content="website" />

  <title>MenControl Pro - Đăng nhập</title>

  <!-- PWA Icons (iOS + Android) -->
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icons/icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="assets/icons/icon.svg" />

  <!-- Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Preconnect fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ── Base ── */
    body { background: #060612; }
    #app {
      min-height: 100vh;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    /* ── Splash ── */
    .splash {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #060612; z-index: 9999; gap: 16px;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-icon {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      border-radius: 22px; display: flex;
      align-items: center; justify-content: center;
      font-size: 36px; box-shadow: 0 0 40px rgba(108,99,255,0.5);
      animation: splash-pulse 1.5s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%,100% { box-shadow: 0 0 40px rgba(108,99,255,0.5); }
      50%      { box-shadow: 0 0 70px rgba(108,99,255,0.8); }
    }
    .splash-title { font-family:'Inter',sans-serif; font-size:22px; font-weight:800; color:#fff; letter-spacing:-0.5px; }
    .splash-sub   { font-family:'Inter',sans-serif; font-size:13px; color:rgba(255,255,255,0.4); }
    .splash-bar   { width:160px; height:3px; background:rgba(255,255,255,0.1); border-radius:99px; overflow:hidden; margin-top:8px; }
    .splash-bar-fill { height:100%; background:linear-gradient(90deg,#6c63ff,#a78bfa); border-radius:99px; animation:splash-load 1.5s ease forwards; }
    @keyframes splash-load { from{width:0} to{width:100%} }

    /* ── Auth Gate ── */
    #auth-gate {
      position: fixed; inset: 0; z-index: 8000;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(108,99,255,0.15) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(167,139,250,0.1) 0%, transparent 55%),
        #060612;
      opacity: 0;
      transform: scale(0.97);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      background: rgba(26, 26, 53, 0.85);
      border: 1px solid rgba(108,99,255,0.25);
      border-radius: 28px;
      padding: 40px 32px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.04),
        0 32px 80px rgba(0,0,0,0.6),
        0 0 60px rgba(108,99,255,0.12);
      animation: card-in 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes card-in {
      from { opacity:0; transform:translateY(30px) scale(0.95); }
      to   { opacity:1; transform:translateY(0)   scale(1); }
    }

    .auth-logo {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 10px; margin-bottom: 28px;
    }
    .auth-logo-icon {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      box-shadow: 0 0 32px rgba(108,99,255,0.5);
    }
    .auth-logo-name {
      font-family: 'Inter', sans-serif;
      font-size: 20px; font-weight: 800; color: #f0f0ff;
      background: linear-gradient(135deg,#fff,#8b83ff);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-logo-sub {
      font-family: 'Inter', sans-serif;
      font-size: 12px; color: rgba(240,240,255,0.4);
      letter-spacing: 0.5px;
    }

    .auth-title {
      font-family: 'Inter', sans-serif;
      font-size: 22px; font-weight: 800;
      color: #f0f0ff; text-align: center;
      margin-bottom: 6px;
    }
    .auth-sub {
      font-family: 'Inter', sans-serif;
      font-size: 13px; color: rgba(240,240,255,0.45);
      text-align: center; margin-bottom: 28px;
      line-height: 1.6;
    }

    .auth-field {
      position: relative; margin-bottom: 14px;
    }
    .auth-field-label {
      font-family: 'Inter', sans-serif;
      font-size: 11px; font-weight: 700;
      color: rgba(240,240,255,0.45);
      text-transform: uppercase; letter-spacing: 1px;
      display: block; margin-bottom: 8px;
    }
    .auth-input-wrap {
      position: relative; display: flex;
    }
    #auth-input {
      width: 100%; padding: 14px 48px 14px 16px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(108,99,255,0.25);
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 16px; font-weight: 500;
      color: #f0f0ff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.5px;
    }
    #auth-input:focus {
      border-color: rgba(108,99,255,0.6);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
    }
    #auth-input::placeholder { color: rgba(240,240,255,0.2); }
    #auth-input:disabled { opacity: 0.5; cursor: not-allowed; }

    #auth-eye {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      font-size: 18px; color: rgba(240,240,255,0.4);
      transition: color 0.2s; padding: 4px;
      line-height: 1;
    }
    #auth-eye:hover { color: rgba(240,240,255,0.7); }

    /* Shake animation for wrong password */
    @keyframes auth-shake {
      0%,100% { transform: translateX(0); }
      15%      { transform: translateX(-8px); }
      30%      { transform: translateX( 7px); }
      45%      { transform: translateX(-6px); }
      60%      { transform: translateX( 5px); }
      75%      { transform: translateX(-4px); }
      90%      { transform: translateX( 2px); }
    }
    .auth-shake { animation: auth-shake 0.5s ease; }

    #auth-error {
      display: none;
      font-family: 'Inter', sans-serif;
      font-size: 12px; font-weight: 600;
      color: #f87171;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 14px;
      animation: fade-up 0.2s ease;
    }

    .auth-remember {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 20px; cursor: pointer;
    }
    #auth-remember {
      width: 18px; height: 18px;
      accent-color: #6c63ff; cursor: pointer;
    }
    .auth-remember-label {
      font-family: 'Inter', sans-serif;
      font-size: 13px; color: rgba(240,240,255,0.5);
      user-select: none;
    }

    #auth-btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #6c63ff, #a78bfa);
      border: none; border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: 16px; font-weight: 700;
      color: #fff; cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 24px rgba(108,99,255,0.4);
      position: relative; overflow: hidden;
    }
    #auth-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent);
      opacity:0; transition:opacity 0.2s;
    }
    #auth-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(108,99,255,0.55);
    }
    #auth-btn:hover:not(:disabled)::after { opacity:1; }
    #auth-btn:active:not(:disabled) { transform: translateY(0); }
    #auth-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    .auth-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 20px 0 0;
    }
    .auth-divider-line { flex:1; height:1px; background:rgba(255,255,255,0.06); }
    .auth-divider-text {
      font-family:'Inter',sans-serif;
      font-size:11px; color:rgba(240,240,255,0.25);
    }

    .auth-lock-icon {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-top: 14px;
    }
    .auth-lock-text {
      font-family: 'Inter', sans-serif;
      font-size: 11px; color: rgba(240,240,255,0.25);
    }

    /* ── Toggle password link ── */
    .auth-toggle-pw {
      width: 100%; margin-top: 12px;
      background: none; border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 11px;
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      color: rgba(240,240,255,0.45); cursor: pointer;
      transition: all 0.2s;
    }
    .auth-toggle-pw:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(240,240,255,0.7);
    }

    /* ── Biometric main button ── */
    .bio-main-btn {
      width: 100%;
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; padding: 20px 16px;
      background: rgba(108,99,255,0.08);
      border: 2px solid rgba(108,99,255,0.35);
      border-radius: 18px; cursor: pointer;
      transition: all 0.25s; position: relative; overflow: hidden;
    }
    .bio-main-btn::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(circle at center, rgba(108,99,255,0.15), transparent);
      opacity:0; transition:opacity 0.3s;
    }
    .bio-main-btn:hover { border-color:rgba(108,99,255,0.6); transform:translateY(-2px); box-shadow:0 8px 28px rgba(108,99,255,0.25); }
    .bio-main-btn:hover::before { opacity:1; }
    .bio-main-btn:active { transform:scale(0.98); }

    .bio-main-icon {
      font-size: 40px; line-height:1;
      filter: drop-shadow(0 0 12px rgba(108,99,255,0.6));
      animation: bio-pulse 3s ease-in-out infinite;
    }
    @keyframes bio-pulse {
      0%,100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(108,99,255,0.6)); }
      50%      { transform: scale(1.08); filter: drop-shadow(0 0 20px rgba(108,99,255,0.9)); }
    }
    .bio-main-label {
      font-family:'Inter',sans-serif; font-size:15px; font-weight:700;
      color:#f0f0ff;
    }
    .bio-main-hint {
      font-family:'Inter',sans-serif; font-size:11px; font-weight:500;
      color:rgba(240,240,255,0.4);
    }
    .bio-btn--loading .bio-main-icon { animation: bio-spin 1s linear infinite; }
    @keyframes bio-spin { to { transform: rotate(360deg); } }
    .bio-btn--success { border-color: #4ade80; background: rgba(74,222,128,0.08); }
    .bio-btn--success .bio-main-icon { animation: none; }

    /* ── Biometric setup overlay ── */
    .bio-setup-overlay {
      position: fixed; inset:0; z-index:10000;
      background: rgba(6,6,18,0.9);
      backdrop-filter: blur(16px);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      opacity:0; transition: opacity 0.3s;
    }
    .bio-setup-overlay--show { opacity:1; }
    .bio-setup-card {
      width:100%; max-width:340px;
      background: rgba(26,26,53,0.98);
      border: 1px solid rgba(108,99,255,0.3);
      border-radius: 24px; padding: 36px 28px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7), 0 0 48px rgba(108,99,255,0.1);
      animation: card-in 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .bio-setup-icon { font-size:52px; margin-bottom:14px; display:block; }
    .bio-setup-title {
      font-family:'Inter',sans-serif; font-size:20px; font-weight:800;
      color:#f0f0ff; margin:0 0 10px;
    }
    .bio-setup-desc {
      font-family:'Inter',sans-serif; font-size:13px;
      color:rgba(240,240,255,0.55); line-height:1.6; margin:0 0 22px;
    }
    .bio-setup-btn {
      width:100%; padding:14px;
      background: linear-gradient(135deg,#6c63ff,#a78bfa);
      border:none; border-radius:13px;
      font-family:'Inter',sans-serif; font-size:15px; font-weight:700;
      color:#fff; cursor:pointer; transition: all 0.2s; margin-bottom:10px;
      box-shadow: 0 4px 20px rgba(108,99,255,0.4);
    }
    .bio-setup-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 28px rgba(108,99,255,0.5); }
    .bio-setup-btn:disabled { opacity:0.6; cursor:not-allowed; }
    .bio-setup-skip {
      width:100%; padding:11px; background:none;
      border:1px solid rgba(255,255,255,0.08); border-radius:12px;
      font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
      color:rgba(240,240,255,0.4); cursor:pointer; transition:all 0.2s;
    }
    .bio-setup-skip:hover { color:rgba(240,240,255,0.6); background:rgba(255,255,255,0.04); }

    /* Desktop auth card adjustments */
    @media (min-width: 600px) {
      .auth-card { padding: 48px 44px; }
      .auth-title { font-size: 26px; }
    }
  </style>
</head>
<body>

  <!-- ① Splash Screen -->
  <div class="splash" id="splash">
    <div class="splash-icon">⚡</div>
    <div class="splash-title">MenControl Pro</div>
    <div class="splash-sub">Đang tải...</div>
    <div class="splash-bar"><div class="splash-bar-fill"></div></div>
  </div>

  <!-- ② Auth Gate — nội dung render động bởi auth.js -->
  <div id="auth-gate">
    <div class="auth-card">
      <!-- AuthSystem._buildCardHTML() sẽ render vào đây -->
      <div style="text-align:center;padding:40px 0;color:rgba(255,255,255,0.3)">
        <div style="font-size:32px;margin-bottom:12px">⚡</div>
        <div style="font-size:13px">Đang tải...</div>
      </div>
    </div>
  </div>

  <!-- ③ App Root -->
  <div id="app"></div>

  <!-- Scripts -->
  <script src="js/version.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/kegel-timer.js"></script>
  <script src="js/simulation.js"></script>
  <script src="js/app.js"></script>

  <script>
    // ── Khởi động sau khi splash hiện xong ──
    window.addEventListener('load', () => {
      // Ẩn splash sau 1.6s
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(() => splash.remove(), 500);
        }

        // Sau khi splash ẩn → khởi động auth
        setTimeout(() => {
          AuthSystem.init();
        }, 100);
      }, 1600);
    });

    // ── Service Worker (đường dẫn tương đối để hoạt động trên GitHub Pages) ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(e => console.warn('[SW] register failed:', e));
    }
  </script>

</body>
</html>
